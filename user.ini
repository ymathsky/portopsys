; PHP settings for shared hosting (PHP-FPM / CGI)
; This replaces php_flag directives in .htaccess

display_errors = Off
log_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Allow larger uploads for video background files
upload_max_filesize = 256M
post_max_size = 260M
max_execution_time = 300
max_input_time = 300
